# Fallow configuration — see https://github.com/fallowjs/fallow
#
# Every exception here is intentional. If you add a new one, include a comment
# explaining *why*. If the reason goes away, delete the exception.

# Additional entry points beyond what fallow auto-detects.
entry = [
    # Expo native build config files; not imported from JS but consumed by
    # Metro/Babel at build time.
    "apps/expo/metro.config.js",
    "apps/expo/babel.config.js",
]

# Files that are loaded dynamically at runtime (never statically imported).
# Fallow treats these as "always used".
dynamicallyLoaded = [
    # @bacons/apple-targets consumes this file via its plugin system at
    # `expo prebuild` time. Not imported from JS.
    "apps/expo/targets/**",
    # Blog MDX loaded at request time by apps/web/lib/blog.ts via
    # `fs.readdirSync(contentDirectory)`.
    "apps/web/content/blog/**/*.mdx",
]

# Directories excluded from all analysis.
ignorePatterns = [
    # Convex-generated API / server / dataModel. Regenerated by `convex dev`.
    "**/_generated/**",
    # Expo / Next.js build artifacts.
    "apps/expo/.expo/**",
    "apps/web/.next/**",
    # Native iOS project (Swift / Xcode files, not TS).
    "apps/expo/ios/**",
    # pnpm patches.
    "patches/**",
]

# Third-party packages declared in package.json but not imported from source.
# All entries below are kept intentionally; removing them breaks build/runtime.
ignoreDependencies = [
    # --- Transitive deps imported directly (not declared locally) ---------
    # Hoisted from @clerk/clerk-expo; used for Clerk types in expo auth.
    "@clerk/types",
    # Transitive dep of typescript-eslint; used by tooling/eslint/base.js.
    "@eslint/js",
    # Transitive dep of expo; used by apps/expo/metro.config.js.
    "@expo/env",
    # Transitive dep of expo; icon font used by a few expo components.
    "@expo/vector-icons",
    # Transitive dep of expo-router; used by apps/expo/src/app/redirect.tsx.
    "@react-navigation/native",
    # Transitive dep of metro; used by apps/expo/metro.config.js.
    "metro-cache",

    # --- Expo plugins loaded via app.config.ts `plugins` array ------------
    # These are never `import`-ed from TS/JS, so fallow cannot see they're
    # used. They must remain installed for `expo prebuild` / EAS builds.
    "expo-apple-authentication",
    "expo-asset",
    "expo-background-task",
    "expo-build-properties",
    "expo-splash-screen",
    "expo-video",
    "onesignal-expo-plugin",

    # --- Peer deps installed explicitly so pnpm hoists them ---------------
    # Peer of @clerk/clerk-expo (OAuth web browser flow).
    "expo-auth-session",
    # Peer of react-native-onesignal (background work, quick actions).
    "expo-clipboard",
    # Peer of expo itself; dev-client runtime (required in dev builds).
    "expo-dev-client",
    # Peer of expo (device info).
    "expo-device",
    # Peer of expo / @expo-google-fonts (font loading).
    "expo-font",
    # Peer of expo / react-native-svg (gradient fills).
    "expo-linear-gradient",
    # Peer of onesignal-expo-plugin (push notifications).
    "expo-notifications",
    # Peer of expo-background-task (background fetch).
    "expo-task-manager",
    # Peer of posthog-react-native (session replay).
    "posthog-react-native-session-replay",
    # Peers of zeego (native iOS menus).
    "react-native-ios-context-menu",
    "react-native-ios-utilities",
    # Peer of react-native-reanimated 4.x (worklet runtime).
    "react-native-worklets",
]

# Per-rule severity.
[rules]
# `export default Foo` in many sibling files (icons, route files) reports as
# "duplicate exports" because fallow compares by export NAME ("default"), not
# identity. We don't care about same-name default exports across files.
duplicate-exports = "off"

# Next.js route-segment config exports (metadata, runtime, revalidate, etc.)
# are looked up by name by the framework, never imported. Fallow has no way to
# know they're used.
[[ignoreExports]]
file = "apps/web/app/**/{page,layout,loading,error,not-found,route,default,template,opengraph-image,twitter-image,icon,apple-icon,sitemap,robots,manifest}.{ts,tsx,js,jsx}"
exports = [
    "metadata",
    "generateMetadata",
    "viewport",
    "generateViewport",
    "runtime",
    "revalidate",
    "dynamic",
    "dynamicParams",
    "fetchCache",
    "preferredRegion",
    "maxDuration",
    "size",
    "alt",
    "contentType",
]

# Expo Router also relies on convention-based named exports from route files.
[[ignoreExports]]
file = "apps/expo/src/app/**/*.{ts,tsx}"
exports = ["default", "unstable_settings", "ErrorBoundary"]

# Convex uses `moduleResolution: "NodeNext"` which requires `.js` extensions on
# relative imports even though the target file is `.d.ts` / `.ts`. Fallow's
# module resolver can't see through that, so migration/generated code shows
# false-positive "unresolved import" errors for `./dataModel.js` etc.
[[overrides]]
files = [
    "packages/backend/convex/migrations/**/*.ts",
    "packages/backend/convex/_generated/**",
]
[overrides.rules]
unresolved-imports = "off"

# Baselines: dupes and complexity represent legacy debt that we can't fix in
# one pass. `fallow audit` uses these files so only NEW issues fail CI;
# existing issues in the baselines are tolerated until we chip away at them.
[audit]
dupesBaseline = ".fallow/baseline-dupes.json"
healthBaseline = ".fallow/baseline-health.json"
